<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Greenscreen Key</title>
  <style>
    html, body { margin:0; height:100%; background:transparent; }
    canvas { width:100vw; height:100vh; display:block; }
    video { display:none; }
  </style>
</head>
<body>
  <canvas id="c" width="1280" height="720"></canvas>

  <video id="v" autoplay muted loop playsinline crossorigin="anonymous">
    <source src="videos/geld_01.mp4" type="video/mp4">
    <!-- falls dein Video webm ist, nimm stattdessen:
    <source src="videos/geld_01.webm" type="video/webm">
    -->
  </video>

  <script>
    const video = document.getElementById('v');
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });

    // Feste Key-Parameter (einfach & stabil)
    const THRESHOLD = 0.38; // höher = mehr wird transparent (mehr wird "als grün" erkannt)
    const SOFTNESS  = 0.12; // weichere Kanten
    const SPILL     = 0.35; // reduziert grüne Ränder

    function smoothstep(e0, e1, x) {
      const t = Math.min(1, Math.max(0, (x - e0) / (e1 - e0)));
      return t * t * (3 - 2 * t);
    }

    function loop() {
      if (video.readyState >= 2) {
        const w = canvas.width, h = canvas.height;

        ctx.clearRect(0, 0, w, h);
        ctx.drawImage(video, 0, 0, w, h);

        const frame = ctx.getImageData(0, 0, w, h);
        const d = frame.data;

        for (let i = 0; i < d.length; i += 4) {
          const r = d[i] / 255;
          const g = d[i + 1] / 255;
          const b = d[i + 2] / 255;

          // "wie grün" ist das Pixel? (grün dominiert über rot/blau)
          const greenness = g - Math.max(r, b);

          // Alpha: je grüner, desto transparenter
          const a = 1 - smoothstep(THRESHOLD - SOFTNESS, THRESHOLD + SOFTNESS, greenness);

          // Spill: grüne Säume etwas runterziehen
          const spillFactor = (1 - a) * SPILL;
          const newG = Math.max(0, Math.min(1, g - spillFactor * 0.6));

          d[i]     = Math.round(r * 255);
          d[i + 1] = Math.round(newG * 255);
          d[i + 2] = Math.round(b * 255);
          d[i + 3] = Math.round(a * 255);
        }

        ctx.putImageData(frame, 0, 0);
      }
      requestAnimationFrame(loop);
    }

    // Autoplay ist manchmal blockiert -> trotzdem starten, sobald möglich
    video.addEventListener('canplay', () => {
      video.play().catch(() => { /* ignorieren */ });
    });

    loop();
  </script>
</body>
</html>
