<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Greenscreen Key (geld_01)</title>
  <style>
    html, body { height: 100%; margin: 0; background:#111; color:#eee; font-family: system-ui, sans-serif; }
    .wrap { max-width: 1100px; margin: 0 auto; padding: 16px; }
    .stage {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9; /* 16:9 wie gewünscht */
      background: transparent;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,.35);
    }
    canvas { width: 100%; height: 100%; display:block; }
    video { display:none; } /* wir rendern über canvas */
    .controls {
      margin-top: 14px;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      align-items: center;
    }
    .controls > div {
      background: rgba(255,255,255,.06);
      padding: 10px 12px;
      border-radius: 10px;
    }
    label { display:flex; gap:10px; align-items:center; justify-content: space-between; font-size: 14px; }
    input[type="range"]{ width: 100%; }
    button {
      cursor:pointer;
      padding: 10px 12px;
      border-radius: 10px;
      border: 0;
      background: #2f7cff;
      color: white;
      font-weight: 600;
    }
    button.secondary { background: rgba(255,255,255,.12); font-weight: 600; }
    .hint { margin-top: 10px; opacity:.8; font-size: 13px; line-height: 1.35; }
    .row { display:flex; gap:10px; }
    .row button { flex: 1; }
  </style>
</head>

<body>
  <div class="wrap">
    <h2>Chroma Key (Grün entfernen): <code>videos/geld_01.mp4</code></h2>

    <div class="stage">
      <canvas id="out" width="1280" height="720"></canvas>
      <video id="vid" playsinline muted loop crossorigin="anonymous">
        <source src="videos/geld_01.mp4" type="video/mp4" />
        <!-- Optional, falls du WebM hast:
        <source src="videos/geld_01.webm" type="video/webm" />
        -->
      </video>
    </div>

    <div class="controls">
      <div>
        <label>Schwellwert (Key)
          <span id="thrVal">0.38</span>
        </label>
        <input id="threshold" type="range" min="0" max="1" step="0.01" value="0.38" />
      </div>

      <div>
        <label>Weichheit (Feather)
          <span id="softVal">0.12</span>
        </label>
        <input id="softness" type="range" min="0" max="0.5" step="0.01" value="0.12" />
      </div>

      <div>
        <label>Spill-Reduktion
          <span id="spillVal">0.35</span>
        </label>
        <input id="spill" type="range" min="0" max="1" step="0.01" value="0.35" />
      </div>

      <div class="row" style="grid-column: 1 / -1;">
        <button id="play">Play</button>
        <button id="pause" class="secondary">Pause</button>
        <button id="toggleBg" class="secondary">Hintergrund Test</button>
      </div>
    </div>

    <div class="hint">
      Tipp: Wenn noch grüne Ränder übrig sind, erhöhe <b>Spill</b> leicht und passe <b>Schwellwert</b>/<b>Weichheit</b> an.
      “Hintergrund Test” legt ein Muster drunter, damit du Transparenz siehst.
    </div>
  </div>

  <script>
    const video = document.getElementById('vid');
    const canvas = document.getElementById('out');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });

    const thr = document.getElementById('threshold');
    const soft = document.getElementById('softness');
    const spill = document.getElementById('spill');

    const thrVal = document.getElementById('thrVal');
    const softVal = document.getElementById('softVal');
    const spillVal = document.getElementById('spillVal');

    const btnPlay = document.getElementById('play');
    const btnPause = document.getElementById('pause');
    const btnBg = document.getElementById('toggleBg');

    let showBg = false;

    function updateLabels() {
      thrVal.textContent = Number(thr.value).toFixed(2);
      softVal.textContent = Number(soft.value).toFixed(2);
      spillVal.textContent = Number(spill.value).toFixed(2);
    }
    [thr, soft, spill].forEach(el => el.addEventListener('input', updateLabels));
    updateLabels();

    // Hintergrund-Testpattern (nur zur Kontrolle der Transparenz)
    function drawBgPattern() {
      const w = canvas.width, h = canvas.height;
      const size = 40;
      for (let y=0; y<h; y+=size) {
        for (let x=0; x<w; x+=size) {
          ctx.fillStyle = ((x/size + y/size) % 2 === 0) ? '#2a2a2a' : '#1b1b1b';
          ctx.fillRect(x, y, size, size);
        }
      }
    }

    // Smoothstep-ähnliche Funktion für weichere Kanten
    function smoothstep(edge0, edge1, x) {
      const t = Math.min(1, Math.max(0, (x - edge0) / (edge1 - edge0)));
      return t * t * (3 - 2 * t);
    }

    function render() {
      if (video.readyState >= 2) {
        const w = canvas.width, h = canvas.height;

        // Optionales Pattern drunter
        if (showBg) drawBgPattern();
        else ctx.clearRect(0, 0, w, h);

        // Video zeichnen
        ctx.drawImage(video, 0, 0, w, h);

        // Pixel holen
        const frame = ctx.getImageData(0, 0, w, h);
        const d = frame.data;

        const threshold = Number(thr.value);   // 0..1
        const softness = Number(soft.value);   // 0..0.5
        const spillAmt  = Number(spill.value); // 0..1

        // Chroma-Key: wir schauen wie "grün" ein Pixel ist
        // grün-Score: G im Verhältnis zu R/B und absolute Grünintensität
        for (let i = 0; i < d.length; i += 4) {
          const r = d[i] / 255;
          const g = d[i + 1] / 255;
          const b = d[i + 2] / 255;

          // "Greenness": wie stark überwiegt Grün?
          const maxRB = Math.max(r, b);
          const greenness = g - maxRB; // >0 bedeutet grün dominiert

          // Alpha über Schwelle + Feather
          const a = 1 - smoothstep(threshold - softness, threshold + softness, greenness);

          // Spill Reduction: wenn sehr grün, reduziere G ein bisschen, damit kein Grünsaum bleibt
          // Stärke hängt von (1-a) ab (also wie stark weggekeyt wird)
          const spillFactor = (1 - a) * spillAmt;
          let newG = g - spillFactor * 0.6; // 0.6 ist ein praxisnaher Wert
          newG = Math.max(0, Math.min(1, newG));

          d[i]     = Math.round(r * 255);
          d[i + 1] = Math.round(newG * 255);
          d[i + 2] = Math.round(b * 255);
          d[i + 3] = Math.round(a * 255);
        }

        ctx.putImageData(frame, 0, 0);
      }

      requestAnimationFrame(render);
    }

    btnPlay.addEventListener('click', async () => {
      try {
        // für Autoplay-Policies: play erst nach User-Geste
        video.muted = true;
        await video.play();
      } catch (e) {
        alert("Konnte Video nicht starten. Öffne die Seite über einen lokalen Server (z.B. Live Server).");
        console.error(e);
      }
    });

    btnPause.addEventListener('click', () => video.pause());
    btnBg.addEventListener('click', () => { showBg = !showBg; });

    // Start loop
    render();
  </script>
</body>
</html>
