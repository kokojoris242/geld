<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Greenscreen Transparent</title>
  <style>
    html, body { margin:0; height:100%; background:transparent; }
    canvas { width:100vw; height:100vh; display:block; background:transparent; }
    video { display:none; }
  </style>
</head>
<body>
  <canvas id="c" width="1280" height="720"></canvas>

  <video id="v" autoplay muted loop playsinline crossorigin="anonymous">
    <source src="videos/geld_01.mp4" type="video/mp4">
    <!-- falls es webm ist:
    <source src="videos/geld_01.webm" type="video/webm">
    -->
  </video>

  <script>
    const video = document.getElementById('v');
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d', { willReadFrequently: true, alpha: true });

    // Aggressiver Key (mehr Grün weg)
    const THRESHOLD = 0.58; // höher = mehr wird als grün erkannt
    const SOFTNESS  = 0.20; // weiche Kanten
    const SPILL     = 1.00; // maximale Spill-Reduktion (Grünsaum killen)

    function smoothstep(e0, e1, x) {
      const t = Math.min(1, Math.max(0, (x - e0) / (e1 - e0)));
      return t * t * (3 - 2 * t);
    }

    function loop() {
      if (video.readyState >= 2) {
        const w = canvas.width, h = canvas.height;

        // transparent leeren
        ctx.clearRect(0, 0, w, h);

        // Video draw
        ctx.drawImage(video, 0, 0, w, h);

        // Pixel bearbeiten
        const frame = ctx.getImageData(0, 0, w, h);
        const d = frame.data;

        for (let i = 0; i < d.length; i += 4) {
          let r = d[i] / 255;
          let g = d[i + 1] / 255;
          let b = d[i + 2] / 255;

          // "Greenness": Grün dominiert über R/B
          const greenness = g - Math.max(r, b);

          // Alpha: je grüner, desto transparenter
          const a = 1 - smoothstep(THRESHOLD - SOFTNESS, THRESHOLD + SOFTNESS, greenness);

          // Spill: Grün reduzieren, besonders wo a klein ist (Randbereiche)
          const spillFactor = (1 - a) * SPILL;
          let newG = g - spillFactor * 0.75;  // stärker als vorher
          newG = Math.max(0, Math.min(1, newG));

          // Extra Spill-Kill: bei halbtransparenten Pixeln G näher an R/B ziehen
          if (a < 0.65) {
            const mix = (0.65 - a) / 0.65; // 0..1
            const rb = Math.max(r, b);
            newG = newG * (1 - mix) + Math.min(newG, rb + 0.02) * mix;
          }

          d[i]     = Math.round(r * 255);
          d[i + 1] = Math.round(newG * 255);
          d[i + 2] = Math.round(b * 255);
          d[i + 3] = Math.round(a * 255);
        }

        ctx.putImageData(frame, 0, 0);
      }

      requestAnimationFrame(loop);
    }

    // Autoplay-Policy umgehen: starten sobald möglich
    video.addEventListener('canplay', () => video.play().catch(() => {}));
    loop();
  </script>
</body>
</html>
